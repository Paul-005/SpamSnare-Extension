<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamSnare IDs | Global Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin-top: 2rem;
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .list-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .badge {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .email-list {
            list-style: none;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        /* Scrollbar styles */
        .email-list::-webkit-scrollbar {
            width: 6px;
        }

        .email-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .email-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .email-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1.25rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            animation: slideIn 0.5s ease-out;
        }

        .email-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .email-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .email-address {
            font-size: 1.1rem;
            font-weight: 500;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .email-icon {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .email-meta {
            text-align: right;
        }

        .email-date {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .email-time {
            font-size: 0.75rem;
            color: rgba(148, 163, 184, 0.6);
            margin-top: 0.25rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 0;
            color: var(--text-muted);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>SpamSnare Live Feed</h1>
            <p class="subtitle">Global feed of identities protected by SpamSnare</p>
        </header>

        <div class="glass-panel">
            <div class="list-header">
                <h2>Generated Emails</h2>
                <div class="badge" id="countBadge">0 Total</div>
            </div>

            <ul class="email-list" id="emailList">
                <div class="empty-state">
                    Loading emails from SpamSnare Database...
                </div>
            </ul>
        </div>
    </div>

    <script>
        const emailListEl = document.getElementById('emailList');
        const countBadge = document.getElementById('countBadge');

        // Fetch and display emails
        async function fetchEmails() {
            try {
                const response = await fetch('https://spam-snare-extension.vercel.app/api/emails');
                const emails = await response.json();
                renderEmails(emails);
            } catch (error) {
                console.error('Error fetching emails:', error);
                emailListEl.innerHTML = '<div class="empty-state">Failed to load emails. Is the server running?</div>';
            }
        }

        // Render emails to DOM
        function renderEmails(emails) {
            countBadge.textContent = `${emails.length} Total`;

            if (emails.length === 0) {
                emailListEl.innerHTML = '<div class="empty-state">No emails generated yet. Use the SpamSnare extension to create one!</div>';
                return;
            }

            emailListEl.innerHTML = '';

            emails.forEach((email, index) => {
                // Parse date from generatedAt or fallback to createdAt
                const date = new Date(email.generatedAt || email.createdAt || Date.now());

                const li = document.createElement('li');
                li.className = 'email-item';
                li.style.animationDelay = `${index * 0.02}s`;

                li.innerHTML = `
                    <div class="email-info">
                        <div class="email-address">
                            <div class="email-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                                    <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                </svg>
                            </div>
                            ${email.email || 'N/A'}
                        </div>
                    </div>
                    <div class="email-meta">
                        <div class="email-date">${date.toLocaleDateString()}</div>
                        <div class="email-time">${date.toLocaleTimeString()}</div>
                    </div>
                `;

                emailListEl.appendChild(li);
            });
        }

        // Initial load
        fetchEmails();

        // Auto-refresh every 10 seconds
        setInterval(fetchEmails, 10000);
    </script>
</body>

</html>
