<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disposable Email Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .email-control {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        input.email-display {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            width: 350px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input.email-display:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .app-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            height: 600px;
        }

        .inbox-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .inbox-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .inbox-item:hover,
        .inbox-item.active {
            background: rgba(139, 92, 246, 0.15);
            border-color: var(--primary);
        }

        .inbox-item .sender {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .inbox-item .subject {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .inbox-item .time {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.5rem;
            display: block;
        }

        .message-view {
            display: flex;
            flex-direction: column;
        }

        .message-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .message-subject {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .message-meta {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .message-body {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            color: #0f172a;
            border-radius: 8px;
            padding: 1.5rem;
            font-family: sans-serif;
            border: 1px solid var(--border-color);
        }

        .message-body iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>GuerrillaMail Generator</h1>
            <p style="color: var(--text-muted);">Create disposable emails and view your inbox instantly</p>
        </header>

        <div class="glass-panel email-control">
            <input type="text" id="emailDisplay" class="email-display" placeholder="Enter email or click generate..." />
            <button id="btnGenerate" onclick="generateEmail()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
                    <path d="M21 3v5h-5" />
                </svg>
                Generate Email
            </button>
            <button id="btnRefresh" onclick="fetchInbox()">
                <div class="loader" id="refreshLoader"></div>
                <span id="refreshText">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="vertical-align: middle; margin-right: 4px;">
                        <path d="M3 3v5h5" />
                        <path d="M21 21v-5h-5" />
                        <path
                            d="M3 8c1.73-2.9 4.93-4.8 8.4-4.9 3.47-.1 6.77 1.6 8.6 4.4L21 9M3 15l1 1.5c1.83 2.8 5.13 4.5 8.6 4.4 3.47-.1 6.67-2 8.4-4.9" />
                    </svg>
                    Refresh Inbox
                </span>
            </button>
        </div>

        <div class="app-grid">
            <div class="glass-panel" style="display: flex; flex-direction: column;">
                <h3 style="margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border-color);">
                    Inbox</h3>
                <div id="inboxList" class="inbox-list">
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" style="margin-bottom: 1rem; opacity: 0.5;">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                            <polyline points="22,6 12,13 2,6" />
                        </svg>
                        <p>Generate an email to view inbox</p>
                    </div>
                </div>
            </div>

            <div class="glass-panel message-view">
                <div id="messageContent" style="height: 100%; display: flex; flex-direction: column;">
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1.5" style="margin-bottom: 1rem; opacity: 0.5;">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                            <polyline points="10 9 9 9 8 9" />
                        </svg>
                        <p>Select a message to read</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generateEmail() {
            const btn = document.getElementById('btnGenerate');
            btn.disabled = true;
            btn.innerHTML = 'Generating...';

            try {
                const res = await fetch('/api/generate-email');
                const data = await res.json();

                if (data.success) {
                    document.getElementById('emailDisplay').value = data.email;
                    document.getElementById('btnRefresh').disabled = false;
                    fetchInbox();
                } else {
                    alert('Failed to generate email');
                }
            } catch (error) {
                console.error(error);
                alert('Network error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg> Generate Email`;
            }
        }

        async function fetchInbox() {
            const emailInput = document.getElementById('emailDisplay').value.trim();
            if (!emailInput) {
                alert('Please enter an email address first');
                return;
            }

            const loader = document.getElementById('refreshLoader');
            const text = document.getElementById('refreshText');
            loader.style.display = 'block';
            text.style.display = 'none';
            document.getElementById('btnRefresh').disabled = true;

            try {
                const res = await fetch(`/api/inbox?email=${encodeURIComponent(emailInput)}`);
                const data = await res.json();

                const inboxList = document.getElementById('inboxList');
                inboxList.innerHTML = '';

                if (data.success && data.data.inbox && data.data.inbox.length > 0) {
                    data.data.inbox.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = 'inbox-item';
                        div.onclick = () => readMessage(msg.id, div, msg);

                        div.innerHTML = `
                            <div class="sender">${msg.from || 'Unknown Sender'}</div>
                            <div class="subject">${msg.subject || 'No Subject'}</div>
                            <div class="time">${msg.timestamp || 'Unknown time'}</div>
                        `;
                        inboxList.appendChild(div);
                    });
                } else {
                    inboxList.innerHTML = `
                        <div class="empty-state">
                            <p>Inbox is empty</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error(error);
                document.getElementById('inboxList').innerHTML = `<div class="empty-state"><p style="color: #ef4444;">Error fetching inbox</p></div>`;
            } finally {
                loader.style.display = 'none';
                text.style.display = 'inline';
                document.getElementById('btnRefresh').disabled = false;
            }
        }

        async function readMessage(id, element, msgMeta) {
            const emailInput = document.getElementById('emailDisplay').value.trim();
            // Update active state
            document.querySelectorAll('.inbox-item').forEach(el => el.classList.remove('active'));
            if (element) element.classList.add('active');

            const contentDiv = document.getElementById('messageContent');
            contentDiv.innerHTML = `
                <div class="empty-state">
                    <div class="loader" style="display: block; border-top-color: var(--primary); width: 32px; height: 32px;"></div>
                    <p style="margin-top: 1rem;">Loading message...</p>
                </div>
            `;

            try {
                const res = await fetch(`/api/message?email=${encodeURIComponent(emailInput)}&id=${id}`);
                const data = await res.json();

                if (data.success && data.data) {
                    const msg = data.data;

                    let bodyHtml = msg.data || msg.content || 'No content';

                    console.log(msg);

                    if (bodyHtml.includes("Complete the CAPTCHA")) {
                        bodyHtml = `<div style="padding: 2rem; text-align: center; font-family: sans-serif;">
                            <h3 style="color: #ef4444;">CAPTCHA Blocked</h3>
                            <p>The provider is currently blocking the server's requests with a CAPTCHA.</p>
                            <p>This usually happens when it detects scraping from your IP.</p>
                        </div>` + bodyHtml;
                    }

                    // Escape quotes for srcdoc
                    const escapedHtml = bodyHtml.replace(/"/g, '&quot;').replace(/'/g, '&apos;');

                    contentDiv.innerHTML = `
                        <div class="message-header">
                            <h2 class="message-subject">${msgMeta.subject || 'No Subject'}</h2>
                            <div class="message-meta">
                                <div><strong>From:</strong> ${msg.from || msgMeta.from}</div>
                                <div><strong>Date:</strong> ${msg.date || msgMeta.timestamp}</div>
                            </div>
                        </div>
                        <div class="message-body">
                            <iframe id="msgIframe" sandbox="allow-scripts allow-popups allow-forms" srcdoc="${escapedHtml}"></iframe>
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = `<div class="empty-state"><p style="color: #ef4444;">Failed to load message</p></div>`;
                }
            } catch (error) {
                console.error(error);
                contentDiv.innerHTML = `<div class="empty-state"><p style="color: #ef4444;">Error loading message</p></div>`;
            }
        }
    </script>
</body>

</html>
