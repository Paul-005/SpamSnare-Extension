<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spamsnare Inbox</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Helvetica Neue", sans-serif;
      background: radial-gradient(120% 120% at 50% 10%, #0a0c10 40%, #060709 100%);
      color: #f4f4f5;
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    /* Navbar */
    .navbar {
      background: rgba(10, 10, 12, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: transform 0.2s ease;
      color: #ffffff;
    }

    .logo:hover {
      transform: scale(1.01);
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      justify-content: center;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .logo:hover .logo-icon {
      transform: rotate(-3deg) scale(1.05);
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .user-name {
      font-weight: 500;
      color: #a1a1aa;
      font-size: 0.95rem;
    }

    .logout-btn {
      background: rgba(255, 69, 58, 0.15);
      border: 1px solid rgba(255, 69, 58, 0.25);
      color: #ff453a;
      padding: 0.55rem 1.25rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
    }

    .logout-btn:hover {
      background: rgba(255, 69, 58, 0.25);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 69, 58, 0.15);
    }

    .logout-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Main Content */
    .container {
      max-width: 1200px;
      margin: 2.5rem auto;
      padding: 0 2rem;
      width: 100%;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .page-title {
      font-size: 2.25rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.03em;
      margin-bottom: 0.25rem;
    }

    .inbox-email {
      font-size: 1.05rem;
      color: #007aff;
      margin-top: 0.25rem;
      font-weight: 500;
    }

    .refresh-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e4e4e7;
      padding: 0.65rem 1.25rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      backdrop-filter: blur(10px);
    }

    .refresh-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .refresh-btn:active {
      transform: translateY(0) scale(0.98);
    }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: rgba(20, 20, 25, 0.5);
      border-radius: 20px;
      padding: 1.75rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .stat-card:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: #007aff;
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
    }

    .stat-number {
      font-size: 2.25rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      color: #a1a1aa;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Email Cards */
    .emails-container {
      display: grid;
      gap: 1.25rem;
    }

    .email-card {
      background: rgba(20, 20, 25, 0.5);
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
    }

    .email-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(0, 122, 255, 0.2);
      background: rgba(255, 255, 255, 0.02);
    }

    .email-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }

    .email-from {
      font-weight: 600;
      color: #ffffff;
      font-size: 1.05rem;
      letter-spacing: -0.01em;
    }

    .flag-icon {
      font-size: 1.15rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .flag-icon.flagged {
      color: #ff453a;
      transform: scale(1.05);
      filter: drop-shadow(0 0 4px rgba(255, 69, 58, 0.3));
    }

    .flag-icon.unflagged {
      color: #3f3f46;
    }

    .flag-icon:hover {
      transform: scale(1.15);
      color: #ff453a;
    }

    .email-subject {
      color: #a1a1aa;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
      line-height: 1.5;
      font-weight: 400;
    }

    .email-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #71717a;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .email-id {
      font-family: "SF Mono", Monaco, Consolas, monospace;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      font-size: 0.8em;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #d4d4d8;
    }

    /* Loading and Empty States */
    .loading {
      text-align: center;
      padding: 4rem;
      color: #71717a;
    }

    .loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-top: 3px solid #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading p {
      font-size: 1rem;
      color: #a1a1aa;
    }

    .empty-state {
      text-align: center;
      padding: 4rem;
      color: #71717a;
    }

    .empty-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      opacity: 0.6;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .empty-state p {
      font-size: 1rem;
      color: #a1a1aa;
    }

    .error-state {
      background: rgba(255, 69, 58, 0.1);
      border: 1px solid rgba(255, 69, 58, 0.2);
      border-radius: 20px;
      padding: 2.5rem;
      text-align: center;
      color: #ff453a;
      backdrop-filter: blur(20px);
    }

    .error-state p {
      font-size: 1rem;
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        font-size: 15px;
      }

      .navbar {
        padding: 1rem 1.5rem;
      }

      .container {
        padding: 0 1rem;
        margin: 1.5rem auto;
      }

      .page-header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }

      .page-title {
        font-size: 1.8rem;
      }

      .email-header {
        flex-direction: column;
        gap: 0.5rem;
        align-items: flex-start;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .email-card {
        padding: 1.25rem;
      }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <span>Spamsnare</span>
    </div>
    <div class="user-section">
      <span class="user-name">Welcome, User</span>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Email Inbox</h1>
        <div id="inboxEmail" class="inbox-email"></div>
        <div id="leakWarning" style="display: none; margin-top: 1rem; color: #ff758f; font-weight: 600; font-size: 1.15rem; align-items: center; gap: 0.5rem; background: rgba(255, 71, 87, 0.15); border: 1px solid rgba(255, 71, 87, 0.3); padding: 0.5rem 1rem; border-radius: 8px; width: fit-content; backdrop-filter: blur(10px);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
          LEAKED
        </div>
      </div>
      <button id="refreshBtn" class="refresh-btn">
        <span>🔄</span>
        Refresh
      </button>
    </div>



    <!-- Emails Container -->
    <div class="emails-container" id="emailsContainer">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading emails...</p>
      </div>
    </div>
  </div>

  <script src="inbox.js"></script>
</body>

</html>
