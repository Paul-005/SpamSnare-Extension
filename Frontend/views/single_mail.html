<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spamsnare Email View</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Helvetica Neue", sans-serif;
      background: radial-gradient(120% 120% at 50% 10%, #0a0c10 40%, #060709 100%);
      color: #f4f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      background: rgba(10, 10, 12, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.35rem;
      font-weight: 700;
      color: #ffffff;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      justify-content: center;
      font-weight: bold;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .back-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e4e4e7;
      padding: 0.55rem 1.25rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .logout-btn {
      background: rgba(255, 69, 58, 0.15);
      border: 1px solid rgba(255, 69, 58, 0.25);
      color: #ff453a;
      padding: 0.55rem 1.25rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
    }

    .logout-btn:hover {
      background: rgba(255, 69, 58, 0.25);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 69, 58, 0.15);
    }

    /* Main Content */
    .container {
      max-width: 900px;
      margin: 2.5rem auto;
      padding: 0 2rem;
      width: 100%;
    }

    .email-container {
      background: rgba(20, 20, 25, 0.5);
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.04);
      overflow: hidden;
    }

    .email-header {
      padding: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .email-subject {
      font-size: 1.4rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 1.25rem;
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .email-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .meta-label {
      font-size: 0.75rem;
      color: #71717a;
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .meta-value {
      color: #007aff;
      font-weight: 500;
      word-break: break-all;
      font-size: 0.95rem;
    }

    .email-id {
      font-family: "SF Mono", Monaco, Consolas, monospace;
      background: rgba(255, 255, 255, 0.03);
      padding: 0.35rem 0.6rem;
      border-radius: 8px;
      font-size: 0.8em;
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #e4e4e7;
    }

    .action-buttons {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .action-btn {
      background: #007aff;
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: white;
      padding: 0.55rem 1.25rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      box-shadow: 0 2px 8px rgba(0, 122, 255, 0.2);
    }

    .action-btn:hover {
      background: #0066cc;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }

    .action-btn.danger {
      background: rgba(255, 69, 58, 0.15);
      border: 1px solid rgba(255, 69, 58, 0.25);
      color: #ff453a;
      box-shadow: none;
    }

    .action-btn.danger:hover {
      background: rgba(255, 69, 58, 0.25);
      box-shadow: 0 4px 12px rgba(255, 69, 58, 0.15);
    }

    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e4e4e7;
      box-shadow: none;
    }

    .action-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* Email Content */
    .email-content {
      padding: 2rem;
    }

    .content-tabs {
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .tab-btn {
      background: none;
      border: none;
      color: #71717a;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      border-bottom: 2px solid transparent;
      font-size: 0.95rem;
    }

    .tab-btn.active {
      color: #007aff;
      border-bottom-color: #007aff;
    }

    .tab-btn:hover {
      color: #ffffff;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .html-content {
      background: #ffffff;
      color: #1c1c1e;
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      line-height: 1.6;
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .html-content a {
      color: #007aff;
      text-decoration: none;
    }

    .html-content a:hover {
      text-decoration: underline;
    }

    .raw-content {
      background: rgba(0, 0, 0, 0.3);
      padding: 1.5rem;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-family: "SF Mono", Monaco, Consolas, monospace;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #e4e4e7;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 500px;
      overflow-y: auto;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #71717a;
    }

    .loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-top: 3px solid #007aff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .error-state {
      background: rgba(255, 69, 58, 0.1);
      border: 1px solid rgba(255, 69, 58, 0.2);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      color: #ff453a;
      margin: 2rem 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar {
        padding: 1rem 1.5rem;
      }

      .container {
        padding: 0 1rem;
      }

      .email-header {
        padding: 1.5rem;
      }

      .email-content {
        padding: 1.5rem;
      }

      .email-meta {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
      }

      .content-tabs {
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <div class="logo-icon">🛡️</div>
      <span>Spamsnare</span>
    </div>
    <div class="nav-actions">
      <a href="#" id="backBtn" class="back-btn">
        <span>←</span>
        Back to Inbox
      </a>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <div class="email-container" id="emailContainer">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>Loading email...</p>
      </div>
    </div>
  </div>

  <script src="single_mail.js"></script>
</body>

</html>
