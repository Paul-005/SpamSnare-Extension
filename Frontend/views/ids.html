<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spamsnare - My Mail IDs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Helvetica Neue", sans-serif;
      background: radial-gradient(120% 120% at 50% 10%, #0a0c10 40%, #060709 100%);
      color: #f4f4f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 16px;
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    /* Navbar */
    .navbar {
      background: rgba(10, 10, 12, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: transform 0.2s ease;
      color: #ffffff;
    }

    .logo:hover {
      transform: scale(1.01);
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      justify-content: center;
      font-weight: bold;
      transition: transform 0.2s ease;
    }

    .logo:hover .logo-icon {
      transform: rotate(-3deg) scale(1.05);
    }

    .user-section {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .user-name {
      font-weight: 500;
      color: #a1a1aa;
      font-size: 0.95rem;
    }

    .logout-btn {
      background: rgba(255, 69, 58, 0.15);
      border: 1px solid rgba(255, 69, 58, 0.25);
      color: #ff453a;
      padding: 0.55rem 1.25rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
    }

    .logout-btn:hover {
      background: rgba(255, 69, 58, 0.25);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 69, 58, 0.15);
    }

    .logout-btn:active {
      transform: translateY(0) scale(0.98);
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e4e4e7;
      padding: 0.55rem 1.25rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
      text-decoration: none;
      display: inline-block;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .nav-btn:active {
      transform: scale(0.98);
    }

    /* Main Content */
    .container {
      max-width: 1200px;
      margin: 2.5rem auto;
      padding: 0 2rem;
      flex-grow: 1;
      width: 100%;
    }

    .page-title {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 2rem;
      color: #ffffff;
      text-align: center;
      letter-spacing: -0.03em;
    }

    /* Table */
    .table-container {
      background: rgba(20, 20, 25, 0.5);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .table-container:hover {
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(255, 255, 255, 0.02);
      padding: 1.1rem 1.5rem;
      text-align: left;
      font-weight: 600;
      font-size: 0.85rem;
      color: #a1a1aa;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      vertical-align: middle;
      font-size: 0.95rem;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .website-cell {
      color: #007aff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
      position: relative;
    }

    .website-cell:hover {
      color: #0066cc;
    }

    .email-cell {
      color: #e4e4e7;
      font-weight: 400;
    }

    /* Responsive */
    @media (max-width: 768px) {
      body {
        font-size: 15px;
      }

      .navbar {
        padding: 1rem 1.5rem;
      }

      .container {
        padding: 0 1rem;
        margin: 1.5rem auto;
      }

      .page-title {
        font-size: 1.8rem;
      }

      .table-container {
        overflow-x: auto;
      }

      table {
        min-width: 600px;
      }

      th,
      td {
        padding: 1rem;
        font-size: 0.9rem;
      }
    }

    /* Empty state & Loading state */
    .empty-state,
    .loading-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #71717a;
    }

    .empty-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      opacity: 0.6;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .empty-state p {
      font-size: 1rem;
      color: #a1a1aa;
      line-height: 1.6;
    }

    .loading-spinner {
      border: 3px solid rgba(255, 255, 255, 0.05);
      border-top: 3px solid #007aff;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.25rem auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-state p {
      font-size: 1rem;
      color: #a1a1aa;
    }

    .hidden {
      display: none !important;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="logo">
      <img src="3dicons-shield-dynamic-color.png" alt="Spamsnare logo" class="logo-icon" style="object-fit: cover" />
      <span>Spamsnare</span>
    </div>
    <div class="user-section">
      <span class="user-name"></span>
      <a href="console.html" class="nav-btn">Back to Dash</a>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container">
    <h1 class="page-title">My Mail IDs</h1>

    <div class="table-container">
      <table id="credentialsTable">
        <thead>
          <tr>
            <th>Website</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Data will be populated by JavaScript -->
        </tbody>
      </table>

      <!-- Loading State -->
      <div id="loadingState" class="loading-state hidden">
        <div class="loading-spinner"></div>
        <p>Loading data...</p>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">📭</div>
        <p>No registrations yet.</p>
        <p style="margin-top: 0.5rem; font-size: 1rem;">
          Start using SpamSnare on websites to see your email registrations here.
        </p>
      </div>
    </div>
  </div>

  <script src="ids.js"></script>
</body>

</html>
